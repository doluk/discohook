version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    shm_size: 128mb
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_DATABASE:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Webdis (Exposes Redis over HTTP for Discohook's RedisKV)
  webdis:
    image: nicolas/webdis
    environment:
      - LOCAL_REDIS=true
    ports:
      - '7379:7379'

  # Frontend Site / Editor
  site:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-bookworm-slim
        RUN corepack enable yarn
        RUN apt-get update && apt-get install -y git
        WORKDIR /app
        COPY . .
        RUN yarn install
        WORKDIR /app/packages/site
        RUN yarn build
        CMD ["yarn", "start"]
    ports:
      - "8788:8788" # Exposing the frontend wrangler port
    environment:
      - DATABASE_URL=${DB_URL:-postgres://postgres:postgres@db:5432}
      - REDIS_URL=redis://user:password@webdis:7379/0
      - ENVIRONMENT=production
    volumes:
      - ./packages/site/.dev.vars:/app/packages/site/.dev.vars:ro
    depends_on:
      db:
        condition: service_healthy
      webdis:
        condition: service_started

volumes:
  db-data:
  redis-data:
